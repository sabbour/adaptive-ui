<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive UI Apps</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #eef3f8 0%, #dfeaf7 100%);
        color: #1f2a37;
      }

      main {
        width: min(680px, 90vw);
        padding: 40px 36px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 14px 34px rgba(35, 58, 86, 0.18);
      }

      h1 {
        margin: 0 0 14px;
        font-size: 1.7rem;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Adaptive UI</h1>
      <p>Placeholder landing page.</p>
    </main>
  </body>
</html>
