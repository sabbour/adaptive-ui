<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive UI Apps</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #eef3f8 0%, #dfeaf7 100%);
        color: #1f2a37;
      }

      main {
        width: min(680px, 90vw);
        padding: 40px 36px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 14px 34px rgba(35, 58, 86, 0.18);
      }

      h1 {
        margin: 0 0 14px;
        font-size: 1.7rem;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #4b5563;
      }

      .apps {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }

      .app-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 20px;
        border-radius: 10px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        text-decoration: none;
        color: inherit;
        transition: box-shadow 0.15s, border-color 0.15s;
      }

      .app-card:hover {
        border-color: #818cf8;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
      }

      .app-icon {
        font-size: 1.8rem;
        flex-shrink: 0;
      }

      .app-info h2 {
        margin: 0 0 4px;
        font-size: 1rem;
        font-weight: 600;
      }

      .app-info p {
        margin: 0;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Adaptive UI</h1>
      <p>AI-agent-driven apps built with the Adaptive UI framework.</p>

      <div class="apps">
        <a href="/solution-architect/" class="app-card">
          <span class="app-icon">🏗️</span>
          <div class="app-info">
            <h2>Solution Architect</h2>
            <p>Design and deploy production-grade cloud-native architectures with an AI coworker.</p>
          </div>
        </a>

        <a href="/trip-notebook/" class="app-card">
          <span class="app-icon">✈️</span>
          <div class="app-info">
            <h2>Trip Notebook</h2>
            <p>Plan memorable trips with real flight data, maps, weather, and a living scrapbook.</p>
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
