name: Update Submodules

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  # Allow submodule repos to trigger immediately via repository_dispatch
  repository_dispatch:
    types: [submodule-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install control plane dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Sync submodules and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node tooling/workspacectl.mjs sync --create-pr --branch auto/update-submodules --base main
